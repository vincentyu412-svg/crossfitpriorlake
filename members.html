<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Members login — access the CrossFit Prior Lake members-only area.">
  <title>Members Login | CrossFit Prior Lake</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>

  <link rel="preload" href="css/style.css?v=2" as="style">
  <link rel="stylesheet" href="css/style.css?v=2">

  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700&family=Open+Sans:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700&family=Open+Sans:wght@400;500;600&display=swap" media="print" onload="this.media='all'">

  <link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'">

  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700&family=Open+Sans:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  </noscript>

  <link rel="icon" type="image/webp" sizes="32x32" href="images/favicon-32x32.webp">
  <link rel="icon" type="image/webp" sizes="16x16" href="images/favicon-16x16.webp">
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.webp">
  <link rel="manifest" href="site.webmanifest">
  <link rel="canonical" href="https://crossfitpriorlake.com/members.html">
  <meta name="robots" content="noindex, nofollow">
</head>
<body>

  <div class="login-page">
    <div class="login-logo">
      <img src="images/logo.webp" alt="CrossFit Prior Lake">
    </div>
    <div class="login-card">
      <h1 class="login-heading" id="authHeading">Welcome back</h1>
      <p class="login-sub" id="authSub">Sign in to access the members-only area.</p>

      <!-- Login form (default view) -->
      <form class="login-form" id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email address" required autocomplete="email">
        <input type="password" id="loginPassword" placeholder="Password" required autocomplete="current-password">
        <p class="login-error" id="loginError"></p>
        <button type="submit" class="login-btn" id="loginBtn">SIGN IN</button>
      </form>

      <!-- Register form (hidden by default) -->
      <form class="login-form" id="registerForm" style="display:none;">
        <input type="text" id="regName" placeholder="Full name" required autocomplete="name">
        <input type="email" id="regEmail" placeholder="Email address" required autocomplete="email">
        <input type="password" id="regPassword" placeholder="Create password (min 6 characters)" required minlength="6" autocomplete="new-password">
        <input type="password" id="regConfirm" placeholder="Confirm password" required minlength="6" autocomplete="new-password">
        <p class="login-error" id="regError"></p>
        <button type="submit" class="login-btn" id="regBtn">CREATE ACCOUNT</button>
      </form>

      <div class="login-toggle">
        <span id="toggleText">Don't have an account?</span>
        <button type="button" class="login-toggle-btn" id="toggleBtn" onclick="toggleAuthMode()">Create one</button>
      </div>

      <div class="login-forgot">
        <button type="button" class="login-forgot-btn" id="forgotBtn" onclick="forgotPassword()">Forgot password?</button>
      </div>
    </div>
    <a href="index.html" class="login-return">RETURN BACK TO WEBSITE</a>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>

  <script>
    (function() {
      var isLogin = true;

      // If already logged in, redirect
      auth.onAuthStateChanged(function(user) {
        if (user) window.location.href = 'members-area.html';
      });

      // Toggle login / register
      window.toggleAuthMode = function() {
        isLogin = !isLogin;
        document.getElementById('loginForm').style.display = isLogin ? '' : 'none';
        document.getElementById('registerForm').style.display = isLogin ? 'none' : '';
        document.getElementById('authHeading').textContent = isLogin ? 'Welcome back' : 'Create account';
        document.getElementById('authSub').textContent = isLogin
          ? 'Sign in to access the members-only area.'
          : 'Create your account to start tracking.';
        document.getElementById('toggleText').textContent = isLogin ? "Don't have an account?" : 'Already have an account?';
        document.getElementById('toggleBtn').textContent = isLogin ? 'Create one' : 'Sign in';
        document.getElementById('forgotBtn').style.display = isLogin ? '' : 'none';
        document.getElementById('loginError').style.display = 'none';
        document.getElementById('regError').style.display = 'none';
      };

      // Friendly error messages
      function friendlyError(code) {
        switch (code) {
          case 'auth/invalid-email': return 'Please enter a valid email address.';
          case 'auth/user-disabled': return 'This account has been disabled.';
          case 'auth/user-not-found': return 'No account found with that email.';
          case 'auth/wrong-password': return 'Incorrect password. Please try again.';
          case 'auth/invalid-credential': return 'Incorrect email or password.';
          case 'auth/email-already-in-use': return 'An account with this email already exists.';
          case 'auth/weak-password': return 'Password must be at least 6 characters.';
          case 'auth/too-many-requests': return 'Too many attempts. Please wait a moment.';
          default: return 'Something went wrong. Please try again.';
        }
      }

      // Login
      document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var email = document.getElementById('loginEmail').value.trim();
        var password = document.getElementById('loginPassword').value;
        var btn = document.getElementById('loginBtn');
        var err = document.getElementById('loginError');
        err.style.display = 'none';
        btn.disabled = true;
        btn.textContent = 'SIGNING IN...';

        auth.signInWithEmailAndPassword(email, password)
          .then(function() {
            window.location.href = 'members-area.html';
          })
          .catch(function(error) {
            err.textContent = friendlyError(error.code);
            err.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'SIGN IN';
          });
      });

      // Register
      document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var name = document.getElementById('regName').value.trim();
        var email = document.getElementById('regEmail').value.trim();
        var password = document.getElementById('regPassword').value;
        var confirm = document.getElementById('regConfirm').value;
        var btn = document.getElementById('regBtn');
        var err = document.getElementById('regError');
        err.style.display = 'none';

        if (password !== confirm) {
          err.textContent = 'Passwords do not match.';
          err.style.display = 'block';
          return;
        }

        btn.disabled = true;
        btn.textContent = 'CREATING ACCOUNT...';

        auth.createUserWithEmailAndPassword(email, password)
          .then(function(cred) {
            return cred.user.updateProfile({ displayName: name });
          })
          .then(function() {
            window.location.href = 'members-area.html';
          })
          .catch(function(error) {
            err.textContent = friendlyError(error.code);
            err.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'CREATE ACCOUNT';
          });
      });

      // Forgot password
      window.forgotPassword = function() {
        var email = document.getElementById('loginEmail').value.trim();
        if (!email) {
          var err = document.getElementById('loginError');
          err.textContent = 'Enter your email above, then click "Forgot password?"';
          err.style.display = 'block';
          return;
        }
        auth.sendPasswordResetEmail(email)
          .then(function() {
            var err = document.getElementById('loginError');
            err.textContent = 'Password reset email sent! Check your inbox.';
            err.style.display = 'block';
            err.style.color = '#16a34a';
          })
          .catch(function(error) {
            var err = document.getElementById('loginError');
            err.textContent = friendlyError(error.code);
            err.style.display = 'block';
            err.style.color = '';
          });
      };
    })();
  </script>

  <script src="https://widgets.leadconnectorhq.com/loader.js" data-resources-url="https://widgets.leadconnectorhq.com/chat-widget/loader.js" data-widget-id="67d07bcbf71a1a4a21e40b2a"></script>
</body>
</html>
